version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: learning-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: learning_analytics
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./doc/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d learning_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - learning-net

  redis:
    image: redis:7
    container_name: learning-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis123
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - learning-net

volumes:
  postgres_data:
  redis_data:

networks:
  learning-net:
    driver: bridge
