version: '3.8'

services:
  # ==================== 基础设施 ====================
  postgres:
    image: postgres:16
    container_name: learning-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: learning_analytics
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./learning-analytics/doc/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d learning_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - learning-net

  redis:
    image: redis:7
    container_name: learning-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass redis123
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - learning-net

  # ==================== 后端服务 ====================
  backend:
    build:
      context: ./learning-analytics
      dockerfile: Dockerfile
    container_name: learning-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      TZ: Asia/Shanghai
    volumes:
      - upload_data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - learning-net

  # ==================== 前端服务 ====================
  frontend:
    build:
      context: ./learning-analytics-web
      dockerfile: Dockerfile
    container_name: learning-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - learning-net

volumes:
  postgres_data:
  redis_data:
  upload_data:

networks:
  learning-net:
    driver: bridge
